    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';

        import { 
            Clock, Edit3, Calendar, Lock, X, UserPlus, Trash2, Play, Square, 
            ShieldAlert, PlusCircle, Users, Save, Timer, ArrowLeft, CalendarDays, 
            FileText, Printer, Wallet, ChevronDown, ChevronUp, CheckCircle2, Calculator,

            Wand2, Plus, CalendarClock, Sun, Delete
        } from 'lucide-react';

        // --- FIREBASE KONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCg1oov_QwqcIjnnZ-UuuLdgkYTfVdLwWI",
            authDomain: "mabelle-timer.firebaseapp.com",
            projectId: "mabelle-timer",
            storageBucket: "mabelle-timer.firebasestorage.app",
            messagingSenderId: "954709749196",
            appId: "1:954709749196:web:cdf3c446c3f1889efbc169"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = 'mabelle_production_v1';
        const ADMIN_PIN_DEFAULT = "311088";

        // --- LOCATION CONFIG (MÜNCHEN) ---
        const SHOP_COORDS = { lat: 48.1814, lng: 11.5323, radius: 300 };

        const AVAILABLE_ROLES = ['Service', 'Bar', 'Küche', 'Runner', 'Garderobe', 'Event'];
        const SHIFT_COLORS = ['#f97316', '#ef4444', '#3b82f6', '#22c55e', '#a855f7', '#ec4899', '#06b6d4', '#eab308', '#6b7280'];

        // --- HELPERS ---
        const parseDateString = (dateStr) => {
            if (!dateStr) return new Date();
            if (typeof dateStr.toMillis === 'function') return new Date(dateStr.toMillis());
            if (typeof dateStr === 'string' && dateStr.includes('-') && dateStr.length <= 10) {
                const [y, m, d] = dateStr.split('-');
                return new Date(y, m - 1, d);
            }
            const d = new Date(dateStr);
            return isNaN(d.getTime()) ? new Date() : d;
        };

        const safeDate = (val) => {
          if (!val) return new Date();
          if (val && typeof val.toMillis === 'function') {
            return new Date(val.toMillis());
          }
          const d = new Date(val);
          return isNaN(d.getTime()) ? new Date() : d;
        };

        const toLocalIsoDate = (d) => {
            try {
                if (!d || isNaN(d.getTime())) return '';
                const offset = d.getTimezoneOffset();
                const local = new Date(d.getTime() - (offset*60*1000));
                return local.toISOString().split('T')[0];
            } catch(e) { return ''; }
        };

        const formatDate = (dateVal) => {
            try {
                if (!dateVal) return '';
                const d = parseDateString(dateVal);
                if (isNaN(d.getTime())) return '';
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                return `${day}.${month}.${year}`;
            } catch(e) { return ''; }
        };

        // Neues Format: "Mo. 13.04." (ohne Bindestrich)
        const formatDayDate = (dateVal) => {
            try {
                if (!dateVal) return '';
                const d = parseDateString(dateVal);
                if (isNaN(d.getTime())) return '';
                const days = ['So.', 'Mo.', 'Di.', 'Mi.', 'Do.', 'Fr.', 'Sa.'];
                const dayStr = String(d.getDate()).padStart(2, '0');
                const monthStr = String(d.getMonth() + 1).padStart(2, '0');
                return `${days[d.getDay()]} ${dayStr}.${monthStr}.`;
            } catch(e) { return ''; }
        };

        const calculateHoursAndBreak = (start, end) => {
            if (!start || !end) return { netHours: '0.00', breakMins: 0 };
            const s = safeDate(start);
            const e = safeDate(end);
            const diffMs = e.getTime() - s.getTime();
            const diffMins = Math.floor(diffMs / 60000);
            
            // Gesetzliche Pausenregelung (ArbZG § 4)
            let breakMins = 0;
            if (diffMins > 360 && diffMins <= 540) { // über 6 bis 9 Stunden
                breakMins = 30;
            } else if (diffMins > 540) { // über 9 Stunden
                breakMins = 45;
            }
            
            const netMins = Math.max(0, diffMins - breakMins);
            return {
                netHours: (netMins / 60).toFixed(2),
                breakMins: breakMins
            };
        };

        const calculateHours = (start, end) => calculateHoursAndBreak(start, end).netHours;
        const getBreakMinutes = (start, end) => calculateHoursAndBreak(start, end).breakMins;

        const getDefaultPeriod = () => {
          const now = new Date();
          const year = now.getFullYear();
          const month = now.getMonth();
          const day = now.getDate();
          let start, end;

          if (day >= 16) {
            start = new Date(year, month, 16);
            end = new Date(year, month + 1, 15);
          } else {
            start = new Date(year, month - 1, 16);
            end = new Date(year, month, 15);
          }
          start.setHours(0,0,0,0);
          end.setHours(23,59,59,999);
          
          return { start: toLocalIsoDate(start), end: toLocalIsoDate(end) };
        };

        const getMonday = (d) => {
            const date = new Date(d);
            if (isNaN(date.getTime())) return new Date();
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            date.setDate(diff);
            date.setHours(0,0,0,0);
            return date;
        };

        const checkUpcomingBirthdays = (employees) => {
          const today = new Date();
          const nextWeek = new Date();
          nextWeek.setDate(today.getDate() + 7);
          
          return employees.filter(emp => {
            if (!emp.birthDate) return false;
            const parts = emp.birthDate.split('-');
            if (parts.length !== 3) return false;
            const [y, m, d] = parts.map(Number);
            
            const bdayThisYear = new Date(today.getFullYear(), m - 1, d);
            const bdayNextYear = new Date(today.getFullYear() + 1, m - 1, d);
            
            const isToday = today.getDate() === d && today.getMonth() === (m - 1);
            const inRange = (bdayThisYear >= today && bdayThisYear <= nextWeek) || 
                            (bdayNextYear >= today && bdayNextYear <= nextWeek);
                            
            return isToday || inRange;
          }).map(emp => {
             const [y, m, d] = emp.birthDate.split('-').map(Number);
             const isToday = today.getDate() === d && today.getMonth() === (m - 1);
             return { ...emp, isToday, displayDate: `${d}.${m}.` };
          });
        };

        const getDistanceFromLatLonInM = (lat1, lon1, lat2, lon2) => {
          const R = 6371; 
          const dLat = (lat2-lat1) * (Math.PI/180);
          const dLon = (lon2-lon1) * (Math.PI/180); 
          const a = 
            Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * (Math.PI/180)) * Math.cos(lat2 * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
          const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
          const d = R * c; 
          return d * 1000;
        }

        const verifyLocation = () => {
          return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
              reject("Kein GPS verfügbar");
              return;
            }
            navigator.geolocation.getCurrentPosition(
              (position) => {
                const dist = getDistanceFromLatLonInM(
                  position.coords.latitude,
                  position.coords.longitude,
                  SHOP_COORDS.lat,
                  SHOP_COORDS.lng
                );
                if (dist <= SHOP_COORDS.radius) {
                  resolve(true);
                } else {
                  reject(`Abgelehnt: ${Math.round(dist)}m entfernt`);
                }
              },
              (error) => {
                reject("Standortzugriff verweigert!");
              },
              { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
          });
        };

        function App() {
          const [user, setUser] = useState(null);
          const [view, setView] = useState('terminal'); 
          const [showAdminLogin, setShowAdminLogin] = useState(false);
          const [adminSubView, setAdminSubView] = useState('overview'); 
          const [activeEmployee, setActiveEmployee] = useState(null);
          const [isGlobalAdmin, setIsGlobalAdmin] = useState(false);
          const [empScheduleView, setEmpScheduleView] = useState('me'); // 'me' oder 'team'
          
          // Modals
          const [showAddEmployee, setShowAddEmployee] = useState(false);
          const [showEditEmpModal, setShowEditEmpModal] = useState(false);
          const [showManualLog, setShowManualLog] = useState(false);
          const [showSettleModal, setShowSettleModal] = useState(false);
          const [showClockOutModal, setShowClockOutModal] = useState(false);
          const [showBossMsgModal, setShowBossMsgModal] = useState(false); 
          const [showEmployeeMsgPopup, setShowEmployeeMsgPopup] = useState(false); 
          const [showSettingsModal, setShowSettingsModal] = useState(false);
          const [showSecurityModal, setShowSecurityModal] = useState(false);
          const [showOvertimeHistoryModal, setShowOvertimeHistoryModal] = useState(false);
          const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
          const [editingLog, setEditingLog] = useState(null);
          const [showShiftModal, setShowShiftModal] = useState(false);
          const [showShiftTemplateModal, setShowShiftTemplateModal] = useState(false);
          const [showSwapModal, setShowSwapModal] = useState(null); 
          const [showTakeoverModal, setShowTakeoverModal] = useState(null);
          const [takeoverMode, setTakeoverMode] = useState('takeover'); 
          const [tradeShiftId, setTradeShiftId] = useState('');
          
          // Data
          const [period, setPeriod] = useState(getDefaultPeriod());
          const [scheduleWeekStart, setScheduleWeekStart] = useState(getMonday(new Date()));
          const [empScheduleWeekStart, setEmpScheduleWeekStart] = useState(getMonday(new Date()));
          const [selectedEmpForDetails, setSelectedEmpForDetails] = useState(null);
          const [employees, setEmployees] = useState([]);
          const [logs, setLogs] = useState([]);
          const [shifts, setShifts] = useState([]); 
          const [shiftTemplates, setShiftTemplates] = useState([]); 
          const [shiftSwaps, setShiftSwaps] = useState([]); 
          const [availabilities, setAvailabilities] = useState([]);
          const [settlements, setSettlements] = useState([]);
          const [bossMessages, setBossMessages] = useState([]); 
          const [securityLogs, setSecurityLogs] = useState([]); 
          const [weather, setWeather] = useState(null);
          const [currentTime, setCurrentTime] = useState(new Date()); 
          
          // State
          const [adminPin, setAdminPin] = useState(ADMIN_PIN_DEFAULT);
          const [newAdminPinInput, setNewAdminPinInput] = useState('');
          const [confirmPinInput, setConfirmPinInput] = useState('');
          const [statusMsg, setStatusMsg] = useState(null);
          const [loading, setLoading] = useState(true);
          const [dbStatus, setDbStatus] = useState('connecting');
          const [isProcessing, setIsProcessing] = useState(false);

          // Inputs
          const [pin, setPin] = useState('');
          const [newEmpName, setNewEmpName] = useState('');
          const [newEmpPin, setNewEmpPin] = useState('');
          const [newEmpBirthDate, setNewEmpBirthDate] = useState(''); 
          const [newEmpWeeklyHours, setNewEmpWeeklyHours] = useState('40'); 
          const [newEmpRoles, setNewEmpRoles] = useState(['Service']);
          const [newEmpAccess, setNewEmpAccess] = useState('user');
          
          const [clockOutNote, setClockOutNote] = useState('');
          const [checklist, setChecklist] = useState({ cash: false, clean: false, trash: false });
          const [newBossMessage, setNewBossMessage] = useState(''); 
          const [msgRecipient, setMsgRecipient] = useState('all'); 
          const [editEmpData, setEditEmpData] = useState({ id: '', name: '', pin: '', birthDate: '', overtimeBalance: 0, weeklyHours: 40, roles: ['Service'], accessLevel: 'user' }); 
          const [manualLogData, setManualLogData] = useState({ employeeId: '', date: toLocalIsoDate(new Date()), startTime: '08:00', endTime: '16:00' });
          const [settleData, setSettleData] = useState({ billedHours: 0, carryOver: 0 });
          const [manualOvertimeAmount, setManualOvertimeAmount] = useState('');
          const [manualOvertimeNote, setManualOvertimeNote] = useState('');
          const [swapTargetEmp, setSwapTargetEmp] = useState('all');

          // --- DARK MODE STATE ---
          const [isDarkMode, setIsDarkMode] = useState(() => {
              return localStorage.getItem('mabelle_dark_mode') === 'true';
          });

          useEffect(() => {
              if (isDarkMode) {
                  document.body.classList.add('dark-theme');
              } else {
                  document.body.classList.remove('dark-theme');
              }
              localStorage.setItem('mabelle_dark_mode', isDarkMode);
          }, [isDarkMode]);

          // Dienstplan Eingabe
          const [shiftData, setShiftData] = useState({ id: null, employeeId: '', date: '', role: 'Service' });
          const [newTemplate, setNewTemplate] = useState({ id: null, name: '', startTime: '08:00', endTime: '16:00', color: '#f97316' });

          const birthdayAlerts = useMemo(() => checkUpcomingBirthdays(employees), [employees]);

          const hasAdminRights = isGlobalAdmin || (activeEmployee && activeEmployee.accessLevel === 'admin');
          const hasManagerRights = hasAdminRights || (activeEmployee && activeEmployee.accessLevel === 'manager');

          // --- LIVE CLOCK & WEATHER ---
          useEffect(() => {
            const timer = setInterval(() => setCurrentTime(new Date()), 1000);
            return () => clearInterval(timer);
          }, []);

          useEffect(() => {
            const fetchWeather = async () => {
              try {
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.18&longitude=11.53&current_weather=true&daily=temperature_2m_max&timezone=Europe%2FBerlin");
                const data = await res.json();
                if(data.current_weather && data.daily) {
                  setWeather({
                     current: data.current_weather.temperature,
                     max: data.daily.temperature_2m_max[0]
                  });
                }
              } catch(e) { console.log("Weather fetch failed"); }
            };
            fetchWeather();
            const interval = setInterval(fetchWeather, 1800000); 
            return () => clearInterval(interval);
          }, []);

          // --- AUTO CHECKOUT ENGINE ---
          useEffect(() => {
              if (!logs || logs.length === 0) return;
              const interval = setInterval(() => {
                  const now = new Date();
                  logs.forEach(async (log) => {
                      if (!log.endTime) {
                          const start = safeDate(log.startTime);
                          const diffMins = (now.getTime() - start.getTime()) / 60000;
                          if (diffMins >= 585) { 
                              const autoEnd = new Date(start.getTime() + 585 * 60000);
                              try {
                                  await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'timelogs', log.id), {
                                      endTime: Timestamp.fromDate(autoEnd),
                                      calculatedHours: calculateHours(start, autoEnd),
                                      note: (log.note ? log.note + ' | ' : '') + 'Auto-Checkout (>9h Netto erreicht)'
                                  });
                              } catch(e) { console.error(e); }
                          }
                      }
                  });
              }, 60000);
              return () => clearInterval(interval);
          }, [logs]);

          // --- AUTH & SYNC ---
          useEffect(() => {
            const initAuth = async () => {
              try {
                  await signInAnonymously(auth);
              } catch (err) {
                console.error("Auth Fail", err);
                setDbStatus('error');
              }
            };
            initAuth();
            return onAuthStateChanged(auth, (u) => {
                if (u) { setUser(u); setDbStatus('connected'); } 
                else { setDbStatus('disconnected'); }
            });
          }, []);

          useEffect(() => {
            if (!user) return;
            setLoading(true);
            try {
                const empRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
                const logsRef = collection(db, 'artifacts', appId, 'public', 'data', 'timelogs');
                const shiftsRef = collection(db, 'artifacts', appId, 'public', 'data', 'shifts'); 
                const templatesRef = collection(db, 'artifacts', appId, 'public', 'data', 'shift_templates'); 
                const swapsRef = collection(db, 'artifacts', appId, 'public', 'data', 'shift_swaps'); 
                const availRef = collection(db, 'artifacts', appId, 'public', 'data', 'availabilities'); 
                const settRef = collection(db, 'artifacts', appId, 'public', 'data', 'settlements');
                const msgRef = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
                const secRef = collection(db, 'artifacts', appId, 'public', 'data', 'security_logs');
                const settingsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');

                const unsubEmp = onSnapshot(empRef, (snap) => { setEmployees(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))); setLoading(false); setDbStatus('active'); });
                const unsubLogs = onSnapshot(logsRef, (snap) => setLogs(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubShifts = onSnapshot(shiftsRef, (snap) => setShifts(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubTemplates = onSnapshot(templatesRef, (snap) => setShiftTemplates(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))); 
                const unsubSwaps = onSnapshot(swapsRef, (snap) => setShiftSwaps(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))); 
                const unsubAvail = onSnapshot(availRef, (snap) => setAvailabilities(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))); 
                const unsubSett = onSnapshot(settRef, (snap) => setSettlements(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubMsg = onSnapshot(msgRef, (snap) => {
                    const msgs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    msgs.sort((a,b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
                    setBossMessages(msgs);
                });
                const unsubSec = onSnapshot(secRef, (snap) => {
                    const secLogs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    secLogs.sort((a,b) => (b.timestamp?.toMillis?.() || 0) - (a.timestamp?.toMillis?.() || 0));
                    setSecurityLogs(secLogs);
                });
                const unsubSettings = onSnapshot(settingsDoc, (snap) => {
                    if (snap.exists()) { const data = snap.data(); if (data.adminPin) setAdminPin(data.adminPin); } 
                    else { setDoc(settingsDoc, { adminPin: ADMIN_PIN_DEFAULT }, { merge: true }); }
                });
                return () => { unsubEmp(); unsubLogs(); unsubShifts(); unsubTemplates(); unsubSwaps(); unsubAvail(); unsubSett(); unsubMsg(); unsubSec(); unsubSettings(); };
            } catch(e) { setDbStatus('error'); }
          }, [user]);

          useEffect(() => {
              if (view === 'admin' && !hasAdminRights && hasManagerRights) {
                  setAdminSubView('schedule');
              }
          }, [view, hasAdminRights, hasManagerRights]);

          // --- HELPERS ---
          const showStatus = (msg, type) => {
            setStatusMsg({ msg, type });
            setTimeout(() => setStatusMsg(null), 3000);
          };

          const getEmployeeStats = (employeeId, filterPeriod = period) => {
            if (!filterPeriod || !filterPeriod.start || !filterPeriod.end) return { workedHours: '0.00', openHours: '0.00', overtimeAccount: '0.00', totalAvailable: '0.00', logs: [] };
            const startLimit = parseDateString(filterPeriod.start).getTime();
            const endLimit = parseDateString(filterPeriod.end);
            endLimit.setHours(23, 59, 59, 999);

            const filteredLogs = logs
              .filter(l => l.employeeId === employeeId)
              .filter(l => {
                const logDate = safeDate(l.startTime);
                return logDate.getTime() >= startLimit && logDate.getTime() <= endLimit.getTime();
              });

            const workedHours = filteredLogs.reduce((acc, curr) => {
                if (curr.endTime) return acc + parseFloat(calculateHours(curr.startTime, curr.endTime));
                return acc;
            }, 0);

            const periodLogs = filteredLogs;
            const openHours = periodLogs
              .filter(l => !l.isSettled && l.endTime)
              .reduce((acc, curr) => acc + parseFloat(calculateHours(curr.startTime, curr.endTime)), 0);

            const emp = employees.find(e => e.id === employeeId);
            const overtimeAccount = emp ? parseFloat(emp.overtimeBalance || 0) : 0;
            const totalAvailable = overtimeAccount + openHours;

            return { 
                workedHours: workedHours.toFixed(2), 
                openHours: openHours.toFixed(2), 
                overtimeAccount: overtimeAccount.toFixed(2), 
                totalAvailable: totalAvailable.toFixed(2), 
                logs: periodLogs.sort((a,b) => safeDate(b.startTime) - safeDate(a.startTime))

                   const empRoles = e.roles || (e.primaryRole ? [e.primaryRole] : ['Service']);
                   return !empRoles.some(r => AVAILABLE_ROLES.includes(r));
              }).sort((a, b) => {
                  const orderA = a.sortOrder !== undefined ? a.sortOrder : 999;
                  const orderB = b.sortOrder !== undefined ? b.sortOrder : 999;
                  if (orderA === orderB) return a.name.localeCompare(b.name);
                  return orderA - orderB;
              });
              if (otherEmps.length > 0) {
                  groups.push({ role: 'Andere', emps: otherEmps });
              }

              return groups.filter(g => g.emps.length > 0);
          }, [employees]);

          // ABGELEITETE TEAM-PLAN GRUPPE (Für Mitarbeiteransicht)
          const teamPlanGroups = useMemo(() => {
              if (!activeEmployee) return [];
              return groupedEmployees.map(group => {
                  const activeEmps = group.emps.filter(emp => {
                      const hasShift = shifts.some(s => s.employeeId === emp.id && empDaysOfWeek.map(d => toLocalIsoDate(d)).includes(s.date));
                      return hasShift || emp.id === activeEmployee.id;
                  });
                  
                  activeEmps.sort((a, b) => {
                      if (a.id === activeEmployee.id) return -1;
                      if (b.id === activeEmployee.id) return 1;
                      return 0; // maintain original sort order
                  });
                  
                  return { ...group, emps: activeEmps };
              }).filter(g => g.emps.length > 0);
          }, [groupedEmployees, activeEmployee, shifts, empDaysOfWeek]);

          // --- KOPIEREN VORWOCHE ---
          const handleCopyWeek = async () => {
              if (!confirm("Möchtest du alle Schichten der Vorwoche in diese Woche kopieren?")) return;
              setIsProcessing(true);
              const prevStart = new Date(scheduleWeekStart);
              prevStart.setDate(prevStart.getDate() - 7);
              const prevEnd = new Date(prevStart);
              prevEnd.setDate(prevEnd.getDate() + 6);
              
              const shiftsToCopy = shifts.filter(s => {
                  const d = parseDateString(s.date);
                  return d >= prevStart && d <= prevEnd;
              });
              
              if (shiftsToCopy.length === 0) {
                  showStatus("Keine Schichten in der Vorwoche gefunden.", "info");
                  setIsProcessing(false);
                  return;
              }
              
              try {
                  const batch = writeBatch(db);
                  shiftsToCopy.forEach(s => {
                      const oldDate = parseDateString(s.date);
                      const newDate = new Date(oldDate);
                      newDate.setDate(newDate.getDate() + 7);
                      
                      const exists = shifts.find(exist => exist.employeeId === s.employeeId && exist.date === toLocalIsoDate(newDate));
                      if (!exists) {
                          const newShiftRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'shifts'));
                          batch.set(newShiftRef, {
                              employeeId: s.employeeId,
                              date: toLocalIsoDate(newDate),
                              startTime: s.startTime,
                              endTime: s.endTime,
                              calculatedHours: s.calculatedHours,
                              role: s.role,
                              color: s.color || '#f97316'
                          });
                      }
                  });
                  await batch.commit();
                  showStatus("Vorwoche erfolgreich kopiert!", "success");
              } catch(e) {
                  showStatus("Fehler beim Kopieren", "error");
              }
              setIsProcessing(false);
          };

          const handleSaveTemplate = async (e) => {
              e.preventDefault();
              try {
                  if (newTemplate.id) {
                      const { id, ...data } = newTemplate;
                      await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shift_templates', id), data);
                      showStatus("Vorlage aktualisiert", "success");
                  } else {
                      const { id, ...data } = newTemplate;
                      await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'shift_templates'), data);
                      showStatus("Vorlage gespeichert", "success");
                  }
                  setNewTemplate({ id: null, name: '', startTime: '08:00', endTime: '16:00', color: '#f97316' });
              } catch(err) { showStatus("Fehler", "error"); }
          };

          const handleDeleteTemplate = async (id) => {
              try {
                  await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shift_templates', id));
                  showStatus("Vorlage gelöscht", "success");
              } catch(err) { showStatus("Fehler", "error"); }
          };

          const saveShiftFromTemplate = async (template) => {
              try {
                  const start = new Date(`${shiftData.date}T${template.startTime}`);
                  let end = new Date(`${shiftData.date}T${template.endTime}`);
                  if (end < start) end.setDate(end.getDate() + 1);
                  const calc = calculateHours(start, end);
                  
                  const shiftColor = template.color || '#f97316';
                  
                  if (shiftData.id) {
                      await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shifts', shiftData.id), {
                          startTime: template.startTime, endTime: template.endTime, calculatedHours: calc, role: shiftData.role, color: shiftColor
                      });
                  } else {
                      await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'shifts'), {
                          employeeId: shiftData.employeeId, date: shiftData.date, startTime: template.startTime, endTime: template.endTime, calculatedHours: calc, role: shiftData.role, color: shiftColor
                      });
                  }
                  setShowShiftModal(false); showStatus("Schicht gespeichert", "success");
              } catch(err) { showStatus("Fehler beim Speichern", "error"); }
          };

          const saveShift = async (e) => {
              e.preventDefault();
              try {
                  const start = new Date(`${shiftData.date}T${shiftData.startTime}`);
                  let end = new Date(`${shiftData.date}T${shiftData.endTime}`);
                  if (end < start) end.setDate(end.getDate() + 1);
                  const calc = calculateHours(start, end);
                  
                  if (shiftData.id) {
                      await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shifts', shiftData.id), {
                          startTime: shiftData.startTime, endTime: shiftData.endTime, calculatedHours: calc, role: shiftData.role, color: shiftData.color || '#f97316'
                      });
                  } else {
                      await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'shifts'), {
                          employeeId: shiftData.employeeId, date: shiftData.date, startTime: shiftData.startTime, endTime: shiftData.endTime, calculatedHours: calc, role: shiftData.role, color: shiftData.color || '#f97316'
                      });
                  }
                  setShowShiftModal(false); showStatus("Schicht gespeichert", "success");
              } catch(err) { showStatus("Fehler beim Speichern", "error"); }
          };

          const deleteShift = async () => {
              if (!shiftData.id) return;
              try {
                  await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shifts', shiftData.id));
                  
                  const orphanedSwaps = shiftSwaps.filter(swap => swap.shiftId === shiftData.id);
                  if (orphanedSwaps.length > 0) {
                      const batch = writeBatch(db);
                      orphanedSwaps.forEach(swap => batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'shift_swaps', swap.id)));
                      await batch.commit();
                  }
                  
                  setShowShiftModal(false); showStatus("Schicht gelöscht", "success");
              } catch(err) { showStatus("Fehler", "error"); }
          };

          const handleAutoSchedule = async () => {
              if (!confirm("Intelligente Planung für diese Woche starten? (Plant bevorzugt an 'Verfügbar'-Tagen)")) return;
              setIsProcessing(true);
              try {
                  const batch = writeBatch(db);
                  let addedCount = 0;
                  
                  employees.forEach(emp => {
                      const targetWeekly = parseFloat(emp.weeklyHours) || 0;
                      if (targetWeekly <= 0) return;

                      let currentPlanned = parseFloat(getPlannedHoursForPeriod(emp.id, shiftDatesStr[0], shiftDatesStr[6]));
                      let shiftLength = targetWeekly >= 30 ? 8 : (targetWeekly / 3); 
                      if (shiftLength > 8) shiftLength = 8;
                      
                      let possibleDates = [];
                      for (let i = 0; i < 7; i++) {
                          const dateStr = shiftDatesStr[i];
                          if (!shifts.some(s => s.employeeId === emp.id && s.date === dateStr)) {
                              const isAvail = availabilities.some(a => a.employeeId === emp.id && a.date === dateStr);
                              possibleDates.push({ dateStr, isAvail, dayIdx: i });
                          }
                      }
                      
                      possibleDates.sort(() => Math.random() - 0.5);
                      possibleDates.sort((a, b) => (a.isAvail === b.isAvail ? 0 : a.isAvail ? -1 : 1));
                      
                      for (const {dateStr, dayIdx, isAvail} of possibleDates) {
                          if (currentPlanned >= targetWeekly - 0.5) break; 
                          if (dayIdx === 6 && !isAvail) continue;
                          
                          const startH = 9; 
                          let endH = startH + shiftLength;
                          if (shiftLength > 6) endH += 0.5; 
                          
                          const startStrTime = "09:00";
                          const endStrTime = `${String(Math.floor(endH)).padStart(2,'0')}:${(endH % 1) === 0 ? '00' : '30'}`;
                          
                          const sDate = new Date(`${dateStr}T${startStrTime}`);
                          const eDate = new Date(`${dateStr}T${endStrTime}`);
                          const calc = calculateHours(sDate, eDate);
                          
                          const empRoles = emp.roles || (emp.primaryRole ? [emp.primaryRole] : ['Service']);
                          const defaultRole = empRoles.length > 0 ? empRoles[0] : 'Service';

                          const shiftRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'shifts'));
                          batch.set(shiftRef, {
                              employeeId: emp.id, date: dateStr, startTime: startStrTime, endTime: endStrTime, calculatedHours: calc, role: defaultRole, color: '#3b82f6'
                          });
                          
                          currentPlanned += parseFloat(calc);
                          addedCount++;
                      }
                  });
                  
                  if (addedCount > 0) {
                      await batch.commit();
                      showStatus(`${addedCount} Schichten automatisch geplant!`, "success");
                  } else {
                      showStatus("Es gab nichts mehr zu verplanen.", "info");
                  }
              } catch(e) {
                  console.error(e);
                  showStatus("Fehler bei Auto-Planung", "error");
              }
              setIsProcessing(false);
          };

          const handlePrintSchedule = () => {
              // 1. Nur Mitarbeiter, die in dieser Woche eine Schicht haben
              const currentWeekShifts = shifts.filter(s => shiftDatesStr.includes(s.date));
              const activeEmpIds = new Set(currentWeekShifts.map(s => s.employeeId));

              const filteredGroups = groupedEmployees.map(group => ({
                  ...group,
                  emps: group.emps.filter(emp => activeEmpIds.has(emp.id))

              const daysHtml = daysOfWeek.map(d => `<th style="padding:10px; border:1px solid #ddd; background:#f9fafb; text-align:center; width:12%; -webkit-print-color-adjust: exact; print-color-adjust: exact;">${formatDayDate(d)}</th>`).join('');

              const tablesHtml = filteredGroups.map(group => {
                  const empsHtml = group.emps.map(emp => {
                      const cells = shiftDatesStr.map(dateStr => {
                          const shift = shifts.find(s => s.employeeId === emp.id && s.date === dateStr && (s.role === group.role || (!s.role && group.role === 'Service')));
                          
                          if (shift) {
                              const sColor = shift.color || '#f97316';
                              return `<td style="padding:5px; border:1px solid #ddd; text-align:center; vertical-align:middle; width:12%;">
                                  <div style="padding: 4px; border: 1px solid ${sColor}; background: ${sColor}1a; border-radius: 4px; -webkit-print-color-adjust: exact; print-color-adjust: exact;">
                                      <div style="font-weight:bold; font-size:11px; color:${sColor};">${shift.startTime} - ${shift.endTime}</div>
                                  </div>
                              </td>`;
                          }
                          return `<td style="padding:5px; border:1px solid #ddd; text-align:center; color:#ccc; width:12%;">-</td>`;
                      }).join('');
                      
                      return `<tr>
                          <td style="padding:10px; border:1px solid #ddd; font-weight:bold; background:#fff; font-size:14px; -webkit-print-color-adjust: exact; print-color-adjust: exact;">${emp.name}</td>
                          ${cells}
                      </tr>`;
                  }).join('');
                  
                  return `
                  <div style="margin-bottom: 30px; page-break-inside: avoid;">
                      <div style="background:#e5e7eb; padding:10px; font-weight:bold; text-transform:uppercase; font-size:12px; color:#4b5563; border:1px solid #ddd; border-bottom:none; -webkit-print-color-adjust: exact; print-color-adjust: exact;">${group.role}</div>
                      <table style="width:100%; border-collapse:collapse; table-layout:fixed;">
                          <thead>
                              <tr>
                                  <th style="padding:10px; border:1px solid #ddd; background:#f9fafb; text-align:left; width: 16%; -webkit-print-color-adjust: exact; print-color-adjust: exact;">Mitarbeiter</th>
                                  ${daysHtml}
                              </tr>
                          </thead>
                          <tbody>
                              ${empsHtml}
                          </tbody>
                      </table>
                  </div>
                  `;
              }).join('');

              const scriptEnd = "</" + "script>";
              const htmlContent = `
                  <html>
                  <head>
                      <title>Dienstplan KW</title>
                      <style>
                          @media print {
                              * {
                                  -webkit-print-color-adjust: exact !important;
                                  print-color-adjust: exact !important;
                              }
                          }
                          body { font-family: sans-serif; padding: 20px; color: #111827; }
                          h1 { border-bottom: 2px solid #ea580c; padding-bottom: 10px; margin-bottom: 20px; font-size: 24px; color: #111827; }
                          table { font-size: 12px; }
                          th, td { overflow: hidden; word-wrap: break-word; }
                          .footer { margin-top: 30px; font-size: 10px; text-align: center; color: #9ca3af; }
                      </style>
                  </head>
                  <body>
                      <h1>Dienstplan: ${formatDayDate(daysOfWeek[0])} - ${formatDayDate(daysOfWeek[6])}</h1>
                      ${tablesHtml}
                      <div class="footer">Generiert von MABELLE TIMER am ${new Date().toLocaleString('de-DE')}</div>
                      <script>window.onload = function() { window.print(); }${scriptEnd}
                  </body>
                  </html>
              `;
              
              const printWindow = window.open('', '_blank');
              printWindow.document.write(htmlContent);
              printWindow.document.close();
          };

          // --- CSV EXPORT ---
          const handleExportCSV = () => {
              const startLimit = parseDateString(period.start).getTime();
              const endLimit = parseDateString(period.end);
              endLimit.setHours(23, 59, 59, 999);
              
              let csv = "Mitarbeiter;Datum;Start;Ende;Brutto (Std);Pause (Min);Netto (Std);Notiz\n";
              
              employees.forEach(emp => {
                  const empLogs = logs.filter(l => l.employeeId === emp.id && safeDate(l.startTime).getTime() >= startLimit && safeDate(l.startTime).getTime() <= endLimit.getTime());
                  empLogs.forEach(log => {
                      const start = safeDate(log.startTime);
                      const end = log.endTime ? safeDate(log.endTime) : null;
                      const dateStr = formatDate(log.date);
                      const startStr = start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                      const endStr = end ? end.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'Offen';
                      
                      const diffMs = end ? (end.getTime() - start.getTime()) : 0;
                      const diffMins = Math.floor(diffMs / 60000);
                      
                      let breakMins = 0;
                      if (diffMins > 360 && diffMins <= 540) breakMins = 30;
                      else if (diffMins > 540) breakMins = 45;
                      
                      const grossHours = end ? (diffMins / 60).toFixed(2) : '0.00';
                      const netHours = log.calculatedHours || '0.00';
                      const note = log.note ? log.note.replace(/;/g, ',').replace(/\n/g, ' ') : '';
                      
                      csv += `${emp.name};${dateStr};${startStr};${endStr};${grossHours};${breakMins};${netHours};${note}\n`;
                  });
              });
              
              const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' }); 
              const link = document.createElement("a");
              const url = URL.createObjectURL(blob);
              link.setAttribute("href", url);
              link.setAttribute("download", `mabelle_export_${period.start}_${period.end}.csv`);
              link.style.visibility = 'hidden';
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
          };

          if (loading && dbStatus === 'connecting') return <div className="h-screen flex items-center justify-center text-orange-600 font-bold bg-white"><RotateCw className="animate-spin mb-4" size={32} /> LOADING...</div>;

          const currentMsg = getRelevantMessage();
          
          const myEmpRoles = activeEmployee?.roles || (activeEmployee?.primaryRole ? [activeEmployee?.primaryRole] : ['Service']);
          const availableSwaps = shiftSwaps.filter(s => {
              if (s.status !== 'pending') return false;
              
              // Jemand hat meine Schicht angefragt
              if (s.fromEmpId === activeEmployee?.id && s.requestedBy !== activeEmployee?.id) return true;
              // Ich selbst habe angeboten, also mir nicht selbst zeigen
              if (s.fromEmpId === activeEmployee?.id) return false;
              
              // Schicht ist für mich oder an alle in meiner Rolle gerichtet
              const isForMe = s.toEmpId === activeEmployee?.id;
              const isForAllWithMyRole = s.toEmpId === 'all' && myEmpRoles.includes(s.shiftRole);
              return isForMe || isForAllWithMyRole;
          });

          const myUpcomingShifts = shifts.filter(s => s.employeeId === activeEmployee?.id && parseDateString(s.date) >= new Date(new Date().setHours(0,0,0,0))).sort((a,b) => parseDateString(a.date) - parseDateString(b.date));

          return (
            <div className={`font-sans text-gray-900 ${(!activeEmployee && view === 'terminal') ? 'min-h-[100dvh] flex flex-col bg-gray-50' : 'min-h-[100dvh] bg-gray-50 pb-20'}`}>
                <nav className="bg-white border-b border-gray-200 p-4 flex justify-between items-center sticky top-0 z-10 shadow-sm flex-none">
                    <div className="flex items-center gap-3">
                        <div className="bg-orange-600 p-2 rounded-xl"><Clock className="text-white" size={24} /></div>
                        <div><h1 className="text-lg font-black tracking-tight uppercase">MABELLE<span className="text-orange-600">-TIMER</span></h1><div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${dbStatus === 'active' || dbStatus === 'synced' ? 'bg-green-500' : 'bg-red-500 animate-pulse'}`}></div><span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">{dbStatus==='error'?'OFFLINE':'ONLINE'}</span></div></div>
                    </div>
                    <div className="hidden lg:flex items-center gap-4">
                        <div className="flex items-center gap-2 bg-gray-50 px-3 py-1 rounded-xl text-gray-600 text-xs font-bold border border-gray-200"><Clock size={16} /><span>{currentTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span></div>
                        {weather && (<div className="flex items-center gap-2 bg-blue-50 px-3 py-1 rounded-xl text-blue-800 text-xs font-bold border border-blue-100"><ThermometerSun size={16} /><span>{weather.current}°C</span><span className="text-blue-300">|</span><span>Max: {weather.max}°C</span></div>)}
                    </div>
                    <div className="flex gap-2">
                       <button onClick={() => setIsDarkMode(!isDarkMode)} className="px-3 py-2 bg-gray-100 text-gray-600 rounded-xl hover:bg-gray-200 transition" title="Dark Mode umschalten">
                           {isDarkMode ? <Sun size={18} /> : <Moon size={18} />}
                       </button>
                       {view === 'admin' && <div className="flex gap-2">{hasAdminRights && <button onClick={() => setShowSettingsModal(true)} className="px-3 py-2 bg-gray-100 text-gray-600 rounded-xl hover:bg-gray-200"><Settings size={18} /></button>}<button onClick={() => { setView('terminal'); setSelectedEmpForDetails(null); if(isGlobalAdmin) setIsGlobalAdmin(false); }} className="px-4 py-2 bg-red-50 text-red-600 rounded-xl text-xs font-black uppercase border border-red-100">Exit</button></div>}
                       {activeEmployee && view !== 'admin' && <button onClick={() => { setActiveEmployee(null); setView('terminal'); }} className="px-4 py-2 bg-gray-100 text-gray-600 rounded-xl text-xs font-black uppercase">Abmelden</button>}
                    </div>
                </nav>

                <main className={`mx-auto w-full max-w-6xl ${(!activeEmployee && view === 'terminal') ? 'flex-1 flex flex-col p-4 overflow-hidden' : 'p-4 md:p-8'}`}>
                    {statusMsg && <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 ${statusMsg.type === 'success' ? 'bg-gray-900 text-white' : 'bg-red-600 text-white'}`}><p className="font-bold text-sm">{statusMsg.msg}</p></div>}

                    {!activeEmployee && view === 'terminal' && (
                        <div className="flex-1 flex flex-col items-center justify-center p-4">
                            {/* Haupt-Karte (Card) - Modernisiertes Design */}
                            <div className="w-full max-w-sm p-8 rounded-2xl shadow-xl transition-all duration-300 border bg-white border-gray-200 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-orange-400 to-orange-600"></div>
                                
                                <div className="mb-8 mt-2 text-center">
                                    <h2 className="text-3xl font-black text-gray-900 mb-1 tracking-tighter uppercase">Mabelle</h2>
                                    <p className="text-orange-600 text-[10px] font-black uppercase tracking-[0.4em]">Timer</p>
                                </div>
                                
                                {/* Die PIN-Punkte (Standard: 4, erweitert sich bei Bedarf) */}
                                <div className="flex justify-center gap-4 mb-8">
                                    {Array.from({ length: Math.max(4, pin.length) }, (_, i) => i).map(i => (
                                        <div 
                                            key={i} 
                                            className={`w-4 h-4 rounded-full border transition-all duration-200 
                                                ${pin.length > i 
                                                    ? 'bg-orange-600 border-orange-600 scale-110 shadow-[0_0_10px_rgba(234,88,12,0.4)]' 
                                                    : 'border-gray-300 bg-transparent'
                                                }`}
                                        ></div>
                                    ))}
                                </div>

                                {/* Das Zahlenfeld (Numpad) */}
                                <div className="grid grid-cols-3 gap-4 mb-2">
                                    {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                                        <button 
                                            key={num} 
                                            onClick={() => handlePinEntry(String(num))} 
                                            className="h-16 rounded-xl text-xl font-bold transition-all active:scale-95 bg-gray-100 text-gray-800 hover:bg-gray-200"
                                        >

                                    {/* Die Null (zentriert in der unteren Reihe) */}

                                        <button 
                                            onClick={() => handlePinEntry('0')} 
                                            className="w-full h-16 rounded-xl text-xl font-bold transition-all active:scale-95 bg-gray-100 text-gray-800 hover:bg-gray-200"
                                        >
                                            0
                                        </button>
                                    </div>
                                    
                                    {/* Löschen-Button (Rücktaste) */}
                                    <div>
                                        <button 
                                            onClick={() => setPin(prev => prev.slice(0, -1))} 
                                            className="w-full h-16 rounded-xl flex items-center justify-center text-gray-500 hover:bg-gray-200 hover:text-red-500 transition-all active:scale-95"
                                        >
                                            <Delete size={24} />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeEmployee && view === 'terminal' && (
                        <div className="max-w-4xl mx-auto space-y-6">
                            {/* TAUSCHANFRAGEN BANNER (Punkt 3) */}
                            {availableSwaps.length > 0 && (
                               <div className="bg-blue-50 border-2 border-blue-200 p-6 rounded-[2rem] shadow-sm mb-6 flex flex-col gap-4 animate-in slide-in-from-top-4">
                                  <div className="flex items-center gap-3 text-blue-700">
                                     <ArrowRightLeft size={24} />
                                     <h3 className="font-black text-lg">Schicht-Tauschbörse</h3>
                                  </div>
                                  {availableSwaps.map(swap => {
                                     const fromEmp = employees.find(e => e.id === swap.fromEmpId);
                                     const requester = employees.find(e => e.id === swap.requestedBy);
                                     let isMyShiftBeingRequested = swap.fromEmpId === activeEmployee?.id && swap.requestedBy !== activeEmployee?.id;

                                     return (
                                         <div key={swap.id} className="bg-white p-4 rounded-xl border border-blue-100 flex flex-col sm:flex-row items-start justify-between shadow-sm gap-4">

                                        <input type="time" required value={editingLog.endTimeStr} onChange={(e) => setEditingLog({...editingLog, endTimeStr: e.target.value})} className="w-full px-5 py-3 bg-gray-50 border-2 rounded-2xl font-bold" />
                                    </div>
                                    <textarea value={editingLog.note} onChange={(e) => setEditingLog({...editingLog, note: e.target.value})} placeholder="Notiz (optional)" className="w-full px-5 py-3 bg-gray-50 border-2 rounded-2xl font-medium h-24 resize-none" />
                                    <button type="submit" className="w-full bg-gray-900 text-white py-5 rounded-2xl font-black text-lg">SPEICHERN</button>
                                </form>
                            </div>
                        </div>
                    )}
                </main>
                
                {(!(!activeEmployee && view === 'terminal')) && (
                    <footer className="py-12 text-center flex-none">
                        <p className="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em]">MABELLE &bull; ID: {appId}</p>
                    </footer>
                )}
            </div>
        );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
