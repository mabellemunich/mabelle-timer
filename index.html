    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';

        // Firebase Services direkt importieren
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, onSnapshot, Timestamp, deleteDoc, query, where, getDocs, writeBatch, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // Icons
        import { 
            Clock, Edit3, Calendar, Lock, X, UserPlus, Trash2, Play, Square, 
            ShieldAlert, PlusCircle, Users, Save, Timer, ArrowLeft, CalendarDays, 
            FileText, Printer, Wallet, ChevronDown, CheckCircle2, Calculator,

        // --- FIREBASE KONFIGURATION (Vollständig eingetragen) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCg1oov_QwqcIjnnZ-UuuLdgkYTfVdLwWI",
            authDomain: "mabelle-timer.firebaseapp.com",
            projectId: "mabelle-timer",
            storageBucket: "mabelle-timer.firebasestorage.app",
            messagingSenderId: "954709749196",
            appId: "1:954709749196:web:cdf3c446c3f1889efbc169"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // FESTE APP ID für Datenkonsistenz
        const appId = 'mabelle_production_v1';
        const ADMIN_PIN_DEFAULT = "311088";

        // STANDORT (München)
        const SHOP_COORDS = { lat: 48.1814, lng: 11.5323, radius: 300 };

        // --- HELPER FUNKTIONEN ---
        const safeDate = (val) => {
            if (!val) return new Date();
            if (val && typeof val.toMillis === 'function') return new Date(val.toMillis());
            const d = new Date(val);
            return isNaN(d.getTime()) ? new Date() : d;
        };

        const formatDate = (dateVal) => {
            if (!dateVal) return '';
            const d = safeDate(dateVal);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}-${month}-${year}`;
        };

        const calculateHours = (start, end) => {
            if (!start || !end) return 0;
            const s = safeDate(start);
            const e = safeDate(end);
            const diffMs = e.getTime() - s.getTime();
            let diffMins = Math.floor(diffMs / 60000);
            // Automatische Pause nach 6 Stunden
            if (diffMins <= 360) {
                 diffMins -= 30; // Immer 30 Min abzug (Grundregel Gastronomie) wenn so gewünscht, sonst anpassen
            } else {
                 diffMins -= 60; 
            }
            return Math.max(0, (diffMins / 60)).toFixed(2);
        };

        const getDefaultPeriod = () => {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const day = now.getDate();
            let start, end;
            if (day >= 16) {
                start = new Date(year, month, 16);
                end = new Date(year, month + 1, 15);
            } else {
                start = new Date(year, month - 1, 16);
                end = new Date(year, month, 15);
            }
            start.setHours(0,0,0,0);
            end.setHours(23,59,59,999);
            const toIso = (d) => {
                const offset = d.getTimezoneOffset();
                const local = new Date(d.getTime() - (offset*60*1000));
                return local.toISOString().split('T')[0];
            };
            return { start: toIso(start), end: toIso(end) };
        };

        const getPeriodOptions = () => {
            const options = [];
            const today = new Date();
            for (let i = -12; i <= 2; i++) {
                const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
                const year = d.getFullYear();
                const month = d.getMonth();
                const start = new Date(year, month, 16);
                const end = new Date(year, month + 1, 15);
                const toIso = (dateObj) => {
                    const offset = dateObj.getTimezoneOffset();
                    const local = new Date(dateObj.getTime() - (offset*60*1000));
                    return local.toISOString().split('T')[0];
                };
                const label = `${formatDate(start)} bis ${formatDate(end)}`;
                options.push({ label: label, value: JSON.stringify({ start: toIso(start), end: toIso(end) }), startIso: toIso(start) });
            }
            return options;
        };

        const checkUpcomingBirthdays = (employees) => {
            const today = new Date();
            const nextWeek = new Date();
            nextWeek.setDate(today.getDate() + 7);
            return employees.filter(emp => {
                if (!emp.birthDate) return false;
                const parts = emp.birthDate.split('-');
                if (parts.length !== 3) return false;
                const [y, m, d] = parts.map(Number);
                const bdayThisYear = new Date(today.getFullYear(), m - 1, d);
                const bdayNextYear = new Date(today.getFullYear() + 1, m - 1, d);
                const isToday = today.getDate() === d && today.getMonth() === (m - 1);
                const inRange = (bdayThisYear >= today && bdayThisYear <= nextWeek) || (bdayNextYear >= today && bdayNextYear <= nextWeek);
                return isToday || inRange;
            }).map(emp => {
                const [y, m, d] = emp.birthDate.split('-').map(Number);
                const isToday = today.getDate() === d && today.getMonth() === (m - 1);
                return { ...emp, isToday, displayDate: `${d}.${m}.` };
            });
        };

        const getDistanceFromLatLonInM = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = (lat2-lat1) * (Math.PI/180);
            const dLon = (lon2-lon1) * (Math.PI/180); 
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * (Math.PI/180)) * Math.cos(lat2 * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            const d = R * c; 
            return d * 1000;
        }

        const verifyLocation = () => {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) { reject("Kein GPS verfügbar"); return; }
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const dist = getDistanceFromLatLonInM(position.coords.latitude, position.coords.longitude, SHOP_COORDS.lat, SHOP_COORDS.lng);
                        if (dist <= SHOP_COORDS.radius) resolve(true); else reject(`Abgelehnt: ${Math.round(dist)}m entfernt`);
                    },
                    (error) => reject("Standortzugriff verweigert!"),
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            });
        };

        // --- HAUPTKOMPONENTE ---
        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('terminal'); 
            const [activeEmployee, setActiveEmployee] = useState(null);
            
            // Modals
            const [showAddEmployee, setShowAddEmployee] = useState(false);
            const [showEditEmpModal, setShowEditEmpModal] = useState(false);
            const [showManualLog, setShowManualLog] = useState(false);
            const [showSettleModal, setShowSettleModal] = useState(false);
            const [showClockOutModal, setShowClockOutModal] = useState(false);
            const [showBossMsgModal, setShowBossMsgModal] = useState(false); 
            const [showEmployeeMsgPopup, setShowEmployeeMsgPopup] = useState(false); 
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [showSecurityModal, setShowSecurityModal] = useState(false);
            const [showOvertimeHistoryModal, setShowOvertimeHistoryModal] = useState(false);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
            const [editingLog, setEditingLog] = useState(null);
            
            // Data
            const [period, setPeriod] = useState(getDefaultPeriod());
            const [selectedEmpForDetails, setSelectedEmpForDetails] = useState(null);
            const [employees, setEmployees] = useState([]);
            const [logs, setLogs] = useState([]);
            const [settlements, setSettlements] = useState([]);
            const [bossMessages, setBossMessages] = useState([]); 
            const [securityLogs, setSecurityLogs] = useState([]); 
            const [weather, setWeather] = useState(null);
            const [currentTime, setCurrentTime] = useState(new Date()); 
            
            // Admin PIN State
            const [adminPin, setAdminPin] = useState(ADMIN_PIN_DEFAULT);
            const [newAdminPinInput, setNewAdminPinInput] = useState('');
            const [confirmPinInput, setConfirmPinInput] = useState('');

            const [statusMsg, setStatusMsg] = useState(null);
            const [loading, setLoading] = useState(true);
            const [dbStatus, setDbStatus] = useState('connecting');
            const [isProcessing, setIsProcessing] = useState(false);

            // Inputs
            const [pin, setPin] = useState('');
            const [newEmpName, setNewEmpName] = useState('');
            const [newEmpPin, setNewEmpPin] = useState('');
            const [newEmpBirthDate, setNewEmpBirthDate] = useState(''); 
            const [clockOutNote, setClockOutNote] = useState('');
            const [newBossMessage, setNewBossMessage] = useState(''); 
            const [msgRecipient, setMsgRecipient] = useState('all'); 
            const [editEmpData, setEditEmpData] = useState({ id: '', name: '', pin: '', birthDate: '', overtimeBalance: 0 });

            const [manualLogData, setManualLogData] = useState({ employeeId: '', date: new Date().toISOString().split('T')[0], startTime: '08:00', endTime: '16:00' });
            const [settleData, setSettleData] = useState({ billedHours: 0, carryOver: 0 });
            
            const [manualOvertimeAmount, setManualOvertimeAmount] = useState('');
            const [manualOvertimeNote, setManualOvertimeNote] = useState('');

            const periodOptions = useMemo(() => getPeriodOptions(), []);
            const birthdayAlerts = useMemo(() => checkUpcomingBirthdays(employees), [employees]);

            // Effects (Clock, Weather, Auth, Data)
            useEffect(() => { const timer = setInterval(() => setCurrentTime(new Date()), 1000); return () => clearInterval(timer); }, []);
            useEffect(() => {
                const fetchWeather = async () => {
                    try {
                        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.18&longitude=11.53&current_weather=true&daily=temperature_2m_max&timezone=Europe%2FBerlin");
                        const data = await res.json();
                        if(data.current_weather && data.daily) { setWeather({ current: data.current_weather.temperature, max: data.daily.temperature_2m_max[0] }); }
                    } catch(e) {}
                };
                fetchWeather();
                const interval = setInterval(fetchWeather, 1800000); return () => clearInterval(interval);
            }, []);
            useEffect(() => {
                const initAuth = async () => { try { await signInAnonymously(auth); } catch (err) { setDbStatus('error'); } };
                initAuth();
                return onAuthStateChanged(auth, (u) => { if (u) { setUser(u); setDbStatus('connected'); } else { setDbStatus('disconnected'); } });
            }, []);
            useEffect(() => {
                if (!user) return;
                setLoading(true);
                try {
                    const empRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
                    const logsRef = collection(db, 'artifacts', appId, 'public', 'data', 'timelogs');
                    const settRef = collection(db, 'artifacts', appId, 'public', 'data', 'settlements');
                    const msgRef = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
                    const secRef = collection(db, 'artifacts', appId, 'public', 'data', 'security_logs');
                    const settingsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');

                    const unsubEmp = onSnapshot(empRef, (snap) => { setEmployees(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))); setLoading(false); setDbStatus('active'); });
                    const unsubLogs = onSnapshot(logsRef, (snap) => setLogs(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                    const unsubSett = onSnapshot(settRef, (snap) => setSettlements(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                    const unsubMsg = onSnapshot(msgRef, (snap) => {
                        const msgs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        msgs.sort((a,b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
                        setBossMessages(msgs);
                    });
                    const unsubSec = onSnapshot(secRef, (snap) => {
                        const secLogs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        secLogs.sort((a,b) => (b.timestamp?.toMillis?.() || 0) - (a.timestamp?.toMillis?.() || 0));
                        setSecurityLogs(secLogs);
                    });
                    const unsubSettings = onSnapshot(settingsDoc, (snap) => {
                        if (snap.exists()) { const data = snap.data(); if (data.adminPin) setAdminPin(data.adminPin); } 
                        else { setDoc(settingsDoc, { adminPin: ADMIN_PIN_DEFAULT }, { merge: true }); }
                    });
                    return () => { unsubEmp(); unsubLogs(); unsubSett(); unsubMsg(); unsubSec(); unsubSettings(); };
                } catch(e) { setDbStatus('error'); }
            }, [user]);

            const showStatus = (msg, type) => { setStatusMsg({ msg, type }); setTimeout(() => setStatusMsg(null), 3000); };

            const getEmployeeStats = (employeeId, filterPeriod = period) => {
                const startLimit = new Date(filterPeriod.start).getTime();
                const endLimit = new Date(filterPeriod.end);
                endLimit.setHours(23, 59, 59, 999);
                const filteredLogs = logs.filter(l => l.employeeId === employeeId).filter(l => { const logDate = safeDate(l.startTime); return logDate.getTime() >= startLimit && logDate.getTime() <= endLimit.getTime(); });
                const workedHours = filteredLogs.reduce((acc, curr) => { if (curr.endTime) return acc + parseFloat(curr.calculatedHours || 0); return acc; }, 0);
                const periodLogs = filteredLogs;
                const openHours = periodLogs.filter(l => !l.isSettled && l.endTime).reduce((acc, curr) => acc + parseFloat(curr.calculatedHours || 0), 0);
                const emp = employees.find(e => e.id === employeeId);
                const overtimeAccount = emp ? parseFloat(emp.overtimeBalance || 0) : 0;
                const totalAvailable = overtimeAccount + openHours;
                return { workedHours: workedHours.toFixed(2), openHours: openHours.toFixed(2), overtimeAccount: overtimeAccount.toFixed(2), totalAvailable: totalAvailable.toFixed(2), logs: periodLogs.sort((a,b) => safeDate(b.startTime) - safeDate(a.startTime)) };
            };
            
            const getSettlementHistory = (employeeId) => {
                return settlements.filter(s => s.employeeId === employeeId).sort((a,b) => {
                    const dateA = a.settledAt ? safeDate(a.settledAt) : new Date(a.date);
                    const dateB = b.settledAt ? safeDate(b.settledAt) : new Date(b.date);
                    return dateB - dateA;
                });
            };

            const getActiveLog = (employeeId) => logs.find(l => l.employeeId === employeeId && !l.endTime);
            const getRelevantMessage = () => !activeEmployee ? null : bossMessages.find(msg => !msg.recipientId || msg.recipientId === 'all' || msg.recipientId === activeEmployee.id);

            // Logic Handlers
            const handleChangeAdminPin = async (e) => { e.preventDefault(); if (newAdminPinInput.length < 4) { showStatus("PIN zu kurz", "error"); return; } try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { adminPin: newAdminPinInput }, { merge: true }); setAdminPin(newAdminPinInput); setNewAdminPinInput(''); setShowSettingsModal(false); showStatus("PIN geändert!", "success"); } catch(err) { showStatus("Fehler", "error"); } };
            
            const handlePinEntry = (val) => {
                if (val === 'C') { setPin(''); return; }
                
                const nextPin = pin + val;
                setPin(nextPin);
                
                // Admin Login automatisch
                if (nextPin === adminPin) { 
                    setView('admin'); 
                    setPin(''); 
                    return; 
                }
                
                // Mitarbeiter Login automatisch
                const employee = employees.find(emp => emp.pin === nextPin);
                if (employee) { 
                    setActiveEmployee(employee); 
                    setPeriod(getDefaultPeriod()); 
                    setPin(''); 
                    const hasMsg = bossMessages.find(msg => !msg.recipientId || msg.recipientId === 'all' || msg.recipientId === employee.id); 
                    if(hasMsg) setShowEmployeeMsgPopup(true); 
                    return; 
                }
                
                // PIN zurücksetzen, falls sie zu lang wird
                if (nextPin.length > 10) setPin('');
            };

            const handleToggleShift = async () => {
                if (!activeEmployee || isProcessing || !user) return;
                setIsProcessing(true);
                try { showStatus("Standort-Check...", "info"); await verifyLocation(); } catch (gpsError) { const violationMsg = gpsError.toString() || "Standort Fehler"; await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'security_logs'), { employeeId: activeEmployee.id, employeeName: activeEmployee.name, timestamp: Timestamp.now(), reason: violationMsg }); showStatus(violationMsg, "error"); setIsProcessing(false); return; }
                const activeLog = logs.find(l => l.employeeId === activeEmployee.id && !l.endTime);
                try { if (activeLog) { setShowClockOutModal(true); setIsProcessing(false); return; } else { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'timelogs'), { employeeId: activeEmployee.id, employeeName: activeEmployee.name, startTime: Timestamp.now(), endTime: null, date: new Date().toISOString().split('T')[0], note: '', isSettled: false }); showStatus(`Schicht gestartet: ${activeEmployee.name}`, "success"); } } catch (err) { showStatus("Cloud-Fehler", "error"); }
                setIsProcessing(false);
            };

            const handleStopShiftInit = async () => { try { showStatus("Standort-Check...", "info"); await verifyLocation(); setClockOutNote(''); setShowClockOutModal(true); } catch(gpsError) { const violationMsg = gpsError.toString(); if (activeEmployee) { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'security_logs'), { employeeId: activeEmployee.id, employeeName: activeEmployee.name, timestamp: Timestamp.now(), reason: violationMsg }); } showStatus(gpsError, "error"); } };
            const handleStartShift = async (targetEmpId) => { if (!user) return; const targetEmp = employees.find(e => e.id === targetEmpId); try { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'timelogs'), { employeeId: targetEmp.id, employeeName: targetEmp.name, startTime: Timestamp.now(), endTime: null, date: new Date().toISOString().split('T')[0], note: '', isSettled: false }); showStatus(`Schicht gestartet: ${targetEmp.name}`, "success"); } catch (err) { showStatus("Fehler", "error"); } };
            const handleConfirmClockOut = async () => { if (!user) return; const empId = activeEmployee ? activeEmployee.id : selectedEmpForDetails.id; const empName = activeEmployee ? activeEmployee.name : selectedEmpForDetails.name; const activeLog = logs.find(l => l.employeeId === empId && !l.endTime); if (activeLog) { try { const now = Timestamp.now(); await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'timelogs', activeLog.id), { endTime: now, calculatedHours: calculateHours(activeLog.startTime, now), note: clockOutNote }); showStatus(`Schicht beendet: ${empName}`, "success"); setShowClockOutModal(false); } catch (err) { showStatus("Fehler", "error"); } } };
            const handleAdminStopShift = async (targetEmpId) => { if (!user) return; const activeLog = logs.find(l => l.employeeId === targetEmpId && !l.endTime); if (activeLog) { try { const now = Timestamp.now(); await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'timelogs', activeLog.id), { endTime: now, calculatedHours: calculateHours(activeLog.startTime, now), note: 'Admin Stop' }); showStatus(`Schicht beendet`, "success"); } catch (err) { showStatus("Fehler", "error"); } } };
            const handleDeleteLog = async (logId) => { if(!confirm("Eintrag wirklich löschen?")) return; try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'timelogs', logId)); showStatus("Eintrag gelöscht", "success"); } catch(err) { showStatus("Fehler", "error"); } };
            const handleDeleteSecurityLog = async (logId) => { if(!confirm("Eintrag löschen?")) return; try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'security_logs', logId)); } catch(err) { console.error(err); } };
            const handleDeleteEmployee = async (id) => {
                const promptPin = prompt("Mitarbeiter löschen: Bitte Admin PIN eingeben:");
                if (promptPin !== adminPin) {
                    showStatus("Falsche PIN! Löschen abgebrochen.", "error");
                    return;
                }
                if (!confirm(`Mitarbeiter unwiderruflich löschen? Alle Zeiten gehen verloren!`)) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', id));
                    const logsToDelete = logs.filter(l => l.employeeId === id);
                    const batch = writeBatch(db);
                    logsToDelete.forEach(log => {
                        batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'timelogs', log.id));
                    });
                    if (logsToDelete.length > 0) {
                        await batch.commit();
                    }
                    showStatus("Mitarbeiter & Daten gelöscht", "success");
                    setSelectedEmpForDetails(null);
                } catch (err) {
                    showStatus("Fehler beim Löschen", "error");
                    console.error(err);
                }
            };

            const initiateSystemReset = () => {
                setShowDeleteConfirm({ id: 'SYSTEM_RESET' });
                setConfirmPinInput('');
            };

            const executeSystemReset = async (e) => {
                e.preventDefault();
                if (confirmPinInput !== adminPin) {
                    showStatus("Falsche PIN! Abbruch.", "error");
                    return;
                }
                const allDocs = [...employees.map(e => ({col:'employees',id:e.id})), ...logs.map(l => ({col:'timelogs',id:l.id})), ...settlements.map(s => ({col:'settlements',id:s.id})), ...bossMessages.map(m => ({col:'messages',id:m.id})), ...securityLogs.map(s => ({col:'security_logs', id: s.id}))]; 
                for(const i of allDocs) try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', i.col, i.id)); } catch(e){} 
                showStatus("System zurückgesetzt", "success");
                setShowDeleteConfirm(null);
                setView('terminal');

                            </div>
                        )}

                        {/* ADD EMPLOYEE MODAL (FIXED Z-INDEX) */}
                        {showAddEmployee && (
                            <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[150] p-4">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                                    <div className="flex justify-between items-center mb-8"><h2 className="text-2xl font-black">Neuer Mitarbeiter</h2><button onClick={() => setShowAddEmployee(false)} className="text-gray-400"><X size={28}/></button></div>
                                    <form onSubmit={handleAddEmployee} className="space-y-4">
                                        <input type="text" placeholder="Name" required value={newEmpName} onChange={(e) => setNewEmpName(e.target.value)} className="w-full px-5 py-4 bg-gray-50 border-2 rounded-2xl font-bold" />
                                        <input type="text" placeholder="PIN (4 Zahlen)" required maxLength={4} value={newEmpPin} onChange={(e) => setNewEmpPin(e.target.value.replace(/\D/g, ''))} className="w-full px-5 py-4 bg-gray-50 border-2 rounded-2xl font-mono text-2xl text-center" />
                                        <div className="relative"><label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 block">Geburtsdatum (Optional)</label><input type="date" value={newEmpBirthDate} onChange={(e) => setNewEmpBirthDate(e.target.value)} className="w-full px-5 py-4 bg-gray-50 border-2 rounded-2xl font-bold" /></div>
                                        <button type="submit" className="w-full bg-orange-600 text-white py-5 rounded-2xl font-black text-lg">ANLEGEN</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* DELETE CONFIRMATION MODAL */}
                        {showDeleteConfirm && (
                            <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[150] p-4">
                                <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-xl font-black text-red-600">Sicherheits-Check</h2>
                                        <button onClick={() => setShowDeleteConfirm(null)} className="text-gray-400"><X size={24}/></button>
                                    </div>
                                    <p className="text-sm font-bold text-gray-600 mb-6 text-center">
                                        {showDeleteConfirm.id === 'SYSTEM_RESET' ? 
                                            "ACHTUNG: ALLE DATEN WERDEN GELÖSCHT! Dies kann nicht rückgängig gemacht werden." : 
                                            "Mitarbeiter und alle Zeiten unwiderruflich löschen?"}
                                    </p>
                                    <form onSubmit={showDeleteConfirm.id === 'SYSTEM_RESET' ? executeSystemReset : executeDeleteEmployee} className="space-y-4">
                                        <input 
                                            type="password" 
                                            placeholder="Admin PIN eingeben" 
                                            value={confirmPinInput} 
                                            onChange={(e) => setConfirmPinInput(e.target.value)} 
                                            className="w-full px-5 py-4 bg-red-50 border-2 border-red-100 rounded-2xl font-mono text-2xl text-center outline-none focus:border-red-500" 
                                            autoFocus
                                        />
                                        <button className="w-full bg-red-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-red-700 transition">BESTÄTIGEN & LÖSCHEN</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {editingLog && (
                            <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                                    <div className="flex justify-between items-center mb-6"><h2 className="text-2xl font-black">Bearbeiten</h2><button onClick={() => setEditingLog(null)} className="text-gray-400"><X size={28}/></button></div>
                                    <form onSubmit={handleSaveEdit} className="space-y-4">
                                        <input type="date" required value={editingLog.date} onChange={(e) => setEditingLog({...editingLog, date: e.target.value})} className="w-full px-5 py-3 bg-gray-50 border-2 rounded-2xl font-bold" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="time" required value={editingLog.startTimeStr} onChange={(e) => setEditingLog({...editingLog, startTimeStr: e.target.value})} className="w-full px-5 py-3 bg-gray-50 border-2 rounded-2xl font-bold" />
                                            <input type="time" required value={editingLog.endTimeStr} onChange={(e) => setEditingLog({...editingLog, endTimeStr: e.target.value})} className="w-full px-5 py-3 bg-gray-50 border-2 rounded-2xl font-bold" />
                                        </div>
                                        <textarea value={editingLog.note} onChange={(e) => setEditingLog({...editingLog, note: e.target.value})} placeholder="Notiz (optional)" className="w-full px-5 py-3 bg-gray-50 border-2 rounded-2xl font-medium h-24 resize-none" />
                                        <button type="submit" className="w-full bg-gray-900 text-white py-5 rounded-2xl font-black text-lg">SPEICHERN</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>
                    
                    {(!(!activeEmployee && view === 'terminal')) && (
                        <footer className="py-12 text-center flex-none">
                            <p className="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em]">MABELLE &bull; ID: {appId}</p>
                        </footer>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
