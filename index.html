        } from 'lucide-react';

        // --- FIREBASE KONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCg1oov_QwqcIjnnZ-UuuLdgkYTfVdLwWI",
            authDomain: "mabelle-timer.firebaseapp.com",
            projectId: "mabelle-timer",
            storageBucket: "mabelle-timer.firebasestorage.app",
            messagingSenderId: "954709749196",
            appId: "1:954709749196:web:cdf3c446c3f1889efbc169"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = 'mabelle_production_v1';
        const ADMIN_PIN_DEFAULT = "311088";

        // --- LOCATION CONFIG (MÜNCHEN) ---
        const SHOP_COORDS = { lat: 48.1814, lng: 11.5323, radius: 300 };

        const AVAILABLE_ROLES = ['Service', 'Bar', 'Küche', 'Runner', 'Garderobe', 'Event'];
        const SHIFT_COLORS = ['#f97316', '#ef4444', '#3b82f6', '#22c55e', '#a855f7', '#ec4899', '#06b6d4', '#eab308', '#6b7280'];

        // --- HELPERS ---
        const parseDateString = (dateStr) => {
            if (!dateStr) return new Date();
            if (typeof dateStr.toMillis === 'function') return new Date(dateStr.toMillis());
            if (typeof dateStr === 'string' && dateStr.includes('-') && dateStr.length <= 10) {
                const [y, m, d] = dateStr.split('-');
                return new Date(y, m - 1, d);
            }
            const d = new Date(dateStr);
            return isNaN(d.getTime()) ? new Date() : d;
        };

        const safeDate = (val) => {
          if (!val) return new Date();
          if (val && typeof val.toMillis === 'function') {
            return new Date(val.toMillis());
          }
          const d = new Date(val);
          return isNaN(d.getTime()) ? new Date() : d;
        };

        const toLocalIsoDate = (d) => {
            try {
                if (!d || isNaN(d.getTime())) return '';
                const offset = d.getTimezoneOffset();
                const local = new Date(d.getTime() - (offset*60*1000));
                return local.toISOString().split('T')[0];
            } catch(e) { return ''; }
        };

        const formatDate = (dateVal) => {
            try {
                if (!dateVal) return '';
                const d = parseDateString(dateVal);
                if (isNaN(d.getTime())) return '';
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                return `${day}.${month}.${year}`;
            } catch(e) { return ''; }
        };

        const formatDayDate = (dateVal) => {
            try {
                if (!dateVal) return '';
                const d = parseDateString(dateVal);
                if (isNaN(d.getTime())) return '';
                const days = ['So.', 'Mo.', 'Di.', 'Mi.', 'Do.', 'Fr.', 'Sa.'];
                const dayStr = String(d.getDate()).padStart(2, '0');
                const monthStr = String(d.getMonth() + 1).padStart(2, '0');
                return `${days[d.getDay()]} - ${dayStr}.${monthStr}.`;
            } catch(e) { return ''; }
        };

        const calculateHoursAndBreak = (start, end) => {
            if (!start || !end) return { netHours: '0.00', breakMins: 0 };
            const s = safeDate(start);
            const e = safeDate(end);
            const diffMs = e.getTime() - s.getTime();
            const diffMins = Math.floor(diffMs / 60000);
            
            // Gesetzliche Pausenregelung (ArbZG § 4)
            let breakMins = 0;
            if (diffMins > 360 && diffMins <= 540) { // über 6 bis 9 Stunden
                breakMins = 30;
            } else if (diffMins > 540) { // über 9 Stunden
                breakMins = 45;
            }
            
            const netMins = Math.max(0, diffMins - breakMins);
            return {
                netHours: (netMins / 60).toFixed(2),
                breakMins: breakMins
            };
        };

        const calculateHours = (start, end) => calculateHoursAndBreak(start, end).netHours;
        const getBreakMinutes = (start, end) => calculateHoursAndBreak(start, end).breakMins;

        const getDefaultPeriod = () => {
          const now = new Date();
          const year = now.getFullYear();
          const month = now.getMonth();
          const day = now.getDate();
          let start, end;

          if (day >= 16) {
            start = new Date(year, month, 16);
            end = new Date(year, month + 1, 15);
          } else {
            start = new Date(year, month - 1, 16);
            end = new Date(year, month, 15);
          }
          start.setHours(0,0,0,0);
          end.setHours(23,59,59,999);
          
          return { start: toLocalIsoDate(start), end: toLocalIsoDate(end) };
        };

        const getMonday = (d) => {
            const date = new Date(d);
            if (isNaN(date.getTime())) return new Date();
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            date.setDate(diff);
            date.setHours(0,0,0,0);
            return date;
        };

        const checkUpcomingBirthdays = (employees) => {
          const today = new Date();
          const nextWeek = new Date();
          nextWeek.setDate(today.getDate() + 7);
          
          return employees.filter(emp => {
            if (!emp.birthDate) return false;
            const parts = emp.birthDate.split('-');
            if (parts.length !== 3) return false;
            const [y, m, d] = parts.map(Number);
            
            const bdayThisYear = new Date(today.getFullYear(), m - 1, d);
            const bdayNextYear = new Date(today.getFullYear() + 1, m - 1, d);
            
            const isToday = today.getDate() === d && today.getMonth() === (m - 1);
            const inRange = (bdayThisYear >= today && bdayThisYear <= nextWeek) || 
                            (bdayNextYear >= today && bdayNextYear <= nextWeek);
                            
            return isToday || inRange;
          }).map(emp => {
             const [y, m, d] = emp.birthDate.split('-').map(Number);
             const isToday = today.getDate() === d && today.getMonth() === (m - 1);
             return { ...emp, isToday, displayDate: `${d}.${m}.` };
          });
        };

        const getDistanceFromLatLonInM = (lat1, lon1, lat2, lon2) => {
          const R = 6371; 
          const dLat = (lat2-lat1) * (Math.PI/180);
          const dLon = (lon2-lon1) * (Math.PI/180); 
          const a = 
            Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * (Math.PI/180)) * Math.cos(lat2 * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
          const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
          const d = R * c; 
          return d * 1000;
        }

        const verifyLocation = () => {
          return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
              reject("Kein GPS verfügbar");
              return;
            }
            navigator.geolocation.getCurrentPosition(
              (position) => {
                const dist = getDistanceFromLatLonInM(
                  position.coords.latitude,
                  position.coords.longitude,
                  SHOP_COORDS.lat,
                  SHOP_COORDS.lng
                );
                if (dist <= SHOP_COORDS.radius) {
                  resolve(true);
                } else {
                  reject(`Abgelehnt: ${Math.round(dist)}m entfernt`);
                }
              },
              (error) => {
                reject("Standortzugriff verweigert!");
              },
              { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
          });
        };

        function App() {
          const [user, setUser] = useState(null);
          const [view, setView] = useState('terminal'); 
          const [adminSubView, setAdminSubView] = useState('overview'); 
          const [activeEmployee, setActiveEmployee] = useState(null);
          const [isGlobalAdmin, setIsGlobalAdmin] = useState(false);
          
          // Modals
          const [showAddEmployee, setShowAddEmployee] = useState(false);
          const [showEditEmpModal, setShowEditEmpModal] = useState(false);
          const [showManualLog, setShowManualLog] = useState(false);
          const [showSettleModal, setShowSettleModal] = useState(false);
          const [showClockOutModal, setShowClockOutModal] = useState(false);
          const [showBossMsgModal, setShowBossMsgModal] = useState(false); 
          const [showEmployeeMsgPopup, setShowEmployeeMsgPopup] = useState(false); 
          const [showSettingsModal, setShowSettingsModal] = useState(false);
          const [showSecurityModal, setShowSecurityModal] = useState(false);
          const [showOvertimeHistoryModal, setShowOvertimeHistoryModal] = useState(false);
          const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
          const [editingLog, setEditingLog] = useState(null);
          const [showShiftModal, setShowShiftModal] = useState(false);
          const [showShiftTemplateModal, setShowShiftTemplateModal] = useState(false);
          const [showSwapModal, setShowSwapModal] = useState(null); 
          
          // Data
          const [period, setPeriod] = useState(getDefaultPeriod());
          const [scheduleWeekStart, setScheduleWeekStart] = useState(getMonday(new Date()));
          const [empScheduleWeekStart, setEmpScheduleWeekStart] = useState(getMonday(new Date()));
          const [selectedEmpForDetails, setSelectedEmpForDetails] = useState(null);
          const [employees, setEmployees] = useState([]);
          const [logs, setLogs] = useState([]);
          const [shifts, setShifts] = useState([]); 
          const [shiftTemplates, setShiftTemplates] = useState([]); 
          const [shiftSwaps, setShiftSwaps] = useState([]); 
          const [availabilities, setAvailabilities] = useState([]);
          const [settlements, setSettlements] = useState([]);
          const [bossMessages, setBossMessages] = useState([]); 
          const [securityLogs, setSecurityLogs] = useState([]); 
          const [weather, setWeather] = useState(null);
          const [currentTime, setCurrentTime] = useState(new Date()); 
          
          // State
          const [adminPin, setAdminPin] = useState(ADMIN_PIN_DEFAULT);
          const [newAdminPinInput, setNewAdminPinInput] = useState('');
          const [confirmPinInput, setConfirmPinInput] = useState('');
          const [statusMsg, setStatusMsg] = useState(null);
          const [loading, setLoading] = useState(true);
          const [dbStatus, setDbStatus] = useState('connecting');
          const [isProcessing, setIsProcessing] = useState(false);

          // Inputs
          const [pin, setPin] = useState('');
          const [newEmpName, setNewEmpName] = useState('');
          const [newEmpPin, setNewEmpPin] = useState('');
          const [newEmpBirthDate, setNewEmpBirthDate] = useState(''); 
          const [newEmpWeeklyHours, setNewEmpWeeklyHours] = useState('40'); 
          const [newEmpRoles, setNewEmpRoles] = useState(['Service']);
          const [newEmpAccess, setNewEmpAccess] = useState('user');
          
          const [clockOutNote, setClockOutNote] = useState('');
          const [checklist, setChecklist] = useState({ cash: false, clean: false, trash: false });
          const [newBossMessage, setNewBossMessage] = useState(''); 
          const [msgRecipient, setMsgRecipient] = useState('all'); 
          const [editEmpData, setEditEmpData] = useState({ id: '', name: '', pin: '', birthDate: '', overtimeBalance: 0, weeklyHours: 40, roles: ['Service'], accessLevel: 'user' }); 
          const [manualLogData, setManualLogData] = useState({ employeeId: '', date: toLocalIsoDate(new Date()), startTime: '08:00', endTime: '16:00' });
          const [settleData, setSettleData] = useState({ billedHours: 0, carryOver: 0 });
          const [manualOvertimeAmount, setManualOvertimeAmount] = useState('');
          const [manualOvertimeNote, setManualOvertimeNote] = useState('');
          const [swapTargetEmp, setSwapTargetEmp] = useState('');
          
          // Dienstplan Eingabe
          const [shiftData, setShiftData] = useState({ id: null, employeeId: '', date: '', role: 'Service' });
          const [newTemplate, setNewTemplate] = useState({ id: null, name: '', startTime: '08:00', endTime: '16:00', color: '#f97316' });

          const birthdayAlerts = useMemo(() => checkUpcomingBirthdays(employees), [employees]);

          const hasAdminRights = isGlobalAdmin || (activeEmployee && activeEmployee.accessLevel === 'admin');
          const hasManagerRights = hasAdminRights || (activeEmployee && activeEmployee.accessLevel === 'manager');

          // --- LIVE CLOCK & WEATHER ---
          useEffect(() => {
            const timer = setInterval(() => setCurrentTime(new Date()), 1000);
            return () => clearInterval(timer);
          }, []);

          useEffect(() => {
            const fetchWeather = async () => {
              try {
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.18&longitude=11.53&current_weather=true&daily=temperature_2m_max&timezone=Europe%2FBerlin");
                const data = await res.json();
                if(data.current_weather && data.daily) {
                  setWeather({
                     current: data.current_weather.temperature,
                     max: data.daily.temperature_2m_max[0]
                  });
                }
              } catch(e) { console.log("Weather fetch failed"); }
            };
            fetchWeather();
            const interval = setInterval(fetchWeather, 1800000); 
            return () => clearInterval(interval);
          }, []);

          // --- AUTO CHECKOUT ENGINE ---
          useEffect(() => {
              if (!logs || logs.length === 0) return;
              const interval = setInterval(() => {
                  const now = new Date();
                  logs.forEach(async (log) => {
                      if (!log.endTime) {
                          const start = safeDate(log.startTime);
                          const diffMins = (now.getTime() - start.getTime()) / 60000;
                          if (diffMins >= 585) { 
                              const autoEnd = new Date(start.getTime() + 585 * 60000);
                              try {
                                  await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'timelogs', log.id), {
                                      endTime: Timestamp.fromDate(autoEnd),
                                      calculatedHours: calculateHours(start, autoEnd),
                                      note: (log.note ? log.note + ' | ' : '') + 'Auto-Checkout (>9h Netto erreicht)'
                                  });
                              } catch(e) { console.error(e); }
                          }
                      }
                  });
              }, 60000);
              return () => clearInterval(interval);
          }, [logs]);

          // --- AUTH & SYNC ---
          useEffect(() => {
            const initAuth = async () => {
              try {
                  await signInAnonymously(auth);
              } catch (err) {
                console.error("Auth Fail", err);
                setDbStatus('error');
              }
            };
            initAuth();
            return onAuthStateChanged(auth, (u) => {
                if (u) { setUser(u); setDbStatus('connected'); } 
                else { setDbStatus('disconnected'); }
            });
          }, []);

          useEffect(() => {
            if (!user) return;
            setLoading(true);
            try {
                const empRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
                const logsRef = collection(db, 'artifacts', appId, 'public', 'data', 'timelogs');
                const shiftsRef = collection(db, 'artifacts', appId, 'public', 'data', 'shifts'); 
                const templatesRef = collection(db, 'artifacts', appId, 'public', 'data', 'shift_templates'); 
                const swapsRef = collection(db, 'artifacts', appId, 'public', 'data', 'shift_swaps'); 
                const availRef = collection(db, 'artifacts', appId, 'public', 'data', 'availabilities'); 
                const settRef = collection(db, 'artifacts', appId, 'public', 'data', 'settlements');
                const msgRef = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
                const secRef = collection(db, 'artifacts', appId, 'public', 'data', 'security_logs');
                const settingsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');

                const unsubEmp = onSnapshot(empRef, (snap) => { setEmployees(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))); setLoading(false); setDbStatus('active'); });
                const unsubLogs = onSnapshot(logsRef, (snap) => setLogs(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubShifts = onSnapshot(shiftsRef, (snap) => setShifts(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubTemplates = onSnapshot(templatesRef, (snap) => setShiftTemplates(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))); 
                const unsubSwaps = onSnapshot(swapsRef, (snap) => setShiftSwaps(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))); 
                const unsubAvail = onSnapshot(availRef, (snap) => setAvailabilities(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))); 
                const unsubSett = onSnapshot(settRef, (snap) => setSettlements(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubMsg = onSnapshot(msgRef, (snap) => {
                    const msgs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    msgs.sort((a,b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
                    setBossMessages(msgs);
                });
                const unsubSec = onSnapshot(secRef, (snap) => {
                    const secLogs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    secLogs.sort((a,b) => (b.timestamp?.toMillis?.() || 0) - (a.timestamp?.toMillis?.() || 0));
                    setSecurityLogs(secLogs);
                });
                const unsubSettings = onSnapshot(settingsDoc, (snap) => {
                    if (snap.exists()) { const data = snap.data(); if (data.adminPin) setAdminPin(data.adminPin); } 
                    else { setDoc(settingsDoc, { adminPin: ADMIN_PIN_DEFAULT }, { merge: true }); }
                });
                return () => { unsubEmp(); unsubLogs(); unsubShifts(); unsubTemplates(); unsubSwaps(); unsubAvail(); unsubSett(); unsubMsg(); unsubSec(); unsubSettings(); };
            } catch(e) { setDbStatus('error'); }
          }, [user]);

          useEffect(() => {
              if (view === 'admin' && !hasAdminRights && hasManagerRights) {
                  setAdminSubView('schedule');
              }
          }, [view, hasAdminRights, hasManagerRights]);

          // --- HELPERS ---
          const showStatus = (msg, type) => {
            setStatusMsg({ msg, type });
            setTimeout(() => setStatusMsg(null), 3000);
          };

          const getEmployeeStats = (employeeId, filterPeriod = period) => {
            if (!filterPeriod || !filterPeriod.start || !filterPeriod.end) return { workedHours: '0.00', openHours: '0.00', overtimeAccount: '0.00', totalAvailable: '0.00', logs: [] };
            const startLimit = parseDateString(filterPeriod.start).getTime();
            const endLimit = parseDateString(filterPeriod.end);
            endLimit.setHours(23, 59, 59, 999);

            const filteredLogs = logs
              .filter(l => l.employeeId === employeeId)
              .filter(l => {
                const logDate = safeDate(l.startTime);
                return logDate.getTime() >= startLimit && logDate.getTime() <= endLimit.getTime();
              });

            const workedHours = filteredLogs.reduce((acc, curr) => {
                if (curr.endTime) return acc + parseFloat(curr.calculatedHours || 0);
                return acc;
            }, 0);

            const periodLogs = filteredLogs;
            const openHours = periodLogs
              .filter(l => !l.isSettled && l.endTime)
              .reduce((acc, curr) => acc + parseFloat(curr.calculatedHours || 0), 0);

            const emp = employees.find(e => e.id === employeeId);
            const overtimeAccount = emp ? parseFloat(emp.overtimeBalance || 0) : 0;
            const totalAvailable = overtimeAccount + openHours;

            return { 
                workedHours: workedHours.toFixed(2), 
                openHours: openHours.toFixed(2), 
                overtimeAccount: overtimeAccount.toFixed(2), 
                totalAvailable: totalAvailable.toFixed(2), 
                logs: periodLogs.sort((a,b) => safeDate(b.startTime) - safeDate(a.startTime)) 
            };
          };
          
          const getSettlementHistory = (employeeId) => {
              return settlements.filter(s => s.employeeId === employeeId).sort((a,b) => {
                  const dateA = a.settledAt ? safeDate(a.settledAt) : new Date(a.date);
                  const dateB = b.settledAt ? safeDate(b.settledAt) : new Date(b.date);
                  return dateB - dateA;
              });
          };

          const getPlannedHoursForPeriod = (employeeId, startStr, endStr) => {
              if (!startStr || !endStr) return '0.00';
              const startLimit = parseDateString(startStr).getTime();
              const endLimit = parseDateString(endStr);
              endLimit.setHours(23, 59, 59, 999);
              
              const relevantShifts = shifts.filter(s => {
                  if (s.employeeId !== employeeId) return false;
                  const d = parseDateString(s.date).getTime();
                  return d >= startLimit && d <= endLimit.getTime();
              });
              
              return relevantShifts.reduce((acc, curr) => acc + parseFloat(curr.calculatedHours || 0), 0).toFixed(2);
          };

          const getActiveLog = (employeeId) => logs.find(l => l.employeeId === employeeId && !l.endTime);
          const getRelevantMessage = () => !activeEmployee ? null : bossMessages.find(msg => !msg.recipientId || msg.recipientId === 'all' || msg.recipientId === activeEmployee.id);

          // --- ACTIONS ---
          const handleChangeAdminPin = async (e) => {
            e.preventDefault();
            if (newAdminPinInput.length < 4) { showStatus("PIN zu kurz", "error"); return; }
            try {
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { adminPin: newAdminPinInput }, { merge: true });
              setAdminPin(newAdminPinInput); setNewAdminPinInput(''); setShowSettingsModal(false); showStatus("PIN geändert!", "success");
            } catch(err) { showStatus("Fehler", "error"); }
          };

          const handlePinEntry = (val) => {
              if (val === 'C') { setPin(''); return; }
              const nextPin = pin + val;
              setPin(nextPin);
              if (nextPin === adminPin) { 
                  setIsGlobalAdmin(true);
                  setView('admin'); 
                  setAdminSubView('overview');
                  setPin(''); 
                  return; 
              }
              const employee = employees.find(emp => emp.pin === nextPin);
              if (employee) { 
                  setActiveEmployee(employee); 
                  setPeriod(getDefaultPeriod()); 
                  setEmpScheduleWeekStart(getMonday(new Date()));
                  setPin(''); 
                  const hasMsg = bossMessages.find(msg => !msg.recipientId || msg.recipientId === 'all' || msg.recipientId === employee.id); 
                  if(hasMsg) setShowEmployeeMsgPopup(true); 
                  return; 
              }
              if (nextPin.length > 10) setPin('');
          };

          const handleToggleShift = async () => {
            if (!activeEmployee || isProcessing || !user) return;

              if (!confirm("Intelligente Planung für diese Woche starten? (Plant bevorzugt an 'Verfügbar'-Tagen)")) return;
              setIsProcessing(true);
              try {
                  const batch = writeBatch(db);
                  let addedCount = 0;
                  
                  employees.forEach(emp => {
                      const targetWeekly = parseFloat(emp.weeklyHours) || 0;
                      if (targetWeekly <= 0) return;

                      let currentPlanned = parseFloat(getPlannedHoursForPeriod(emp.id, shiftDatesStr[0], shiftDatesStr[6]));
                      let shiftLength = targetWeekly >= 30 ? 8 : (targetWeekly / 3); 
                      if (shiftLength > 8) shiftLength = 8;
                      
                      let possibleDates = [];
                      for (let i = 0; i < 7; i++) {
                          const dateStr = shiftDatesStr[i];
                          if (!shifts.some(s => s.employeeId === emp.id && s.date === dateStr)) {
                              const isAvail = availabilities.some(a => a.employeeId === emp.id && a.date === dateStr);
                              possibleDates.push({ dateStr, isAvail, dayIdx: i });
                          }
                      }
                      
                      possibleDates.sort(() => Math.random() - 0.5);
                      possibleDates.sort((a, b) => (a.isAvail === b.isAvail ? 0 : a.isAvail ? -1 : 1));
                      
                      for (const {dateStr, dayIdx, isAvail} of possibleDates) {
                          if (currentPlanned >= targetWeekly - 0.5) break; 
                          if (dayIdx === 6 && !isAvail) continue;
                          
                          const startH = 9; 
                          let endH = startH + shiftLength;
                          if (shiftLength > 6) endH += 0.5; 
                          
                          const startStrTime = "09:00";
                          const endStrTime = `${String(Math.floor(endH)).padStart(2,'0')}:${(endH % 1) === 0 ? '00' : '30'}`;
                          
                          const sDate = new Date(`${dateStr}T${startStrTime}`);
                          const eDate = new Date(`${dateStr}T${endStrTime}`);
                          const calc = calculateHours(sDate, eDate);
                          
                          const empRoles = emp.roles || (emp.primaryRole ? [emp.primaryRole] : ['Service']);
                          const defaultRole = empRoles.length > 0 ? empRoles[0] : 'Service';

                          const shiftRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'shifts'));
                          batch.set(shiftRef, {
                              employeeId: emp.id, date: dateStr, startTime: startStrTime, endTime: endStrTime, calculatedHours: calc, role: defaultRole, color: '#3b82f6'
                          });
                          
                          currentPlanned += parseFloat(calc);
                          addedCount++;
                      }
                  });
                  
                  if (addedCount > 0) {
                      await batch.commit();
                      showStatus(`${addedCount} Schichten automatisch geplant!`, "success");
                  } else {
                      showStatus("Es gab nichts mehr zu verplanen.", "info");
                  }

                      const endStr = end ? end.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'Offen';
                      
                      const diffMs = end ? (end.getTime() - start.getTime()) : 0;
                      const diffMins = Math.floor(diffMs / 60000);
                      
                      let breakMins = 0;

                    {showAddEmployee && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[150] p-4">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                                <div className="flex justify-between items-center mb-8"><h2 className="text-2xl font-black">Neuer Mitarbeiter</h2><button onClick={() => setShowAddEmployee(false)} className="text-gray-400"><X size={28}/></button></div>
                                <form onSubmit={handleAddEmployee} className="space-y-4">
                                    <input type="text" placeholder="Name" required value={newEmpName} onChange={(e) => setNewEmpName(e.target.value)} className="w-full px-5 py-4 bg-gray-50 border-2 rounded-2xl font-bold" />
                                    <input type="text" placeholder="PIN (4 Zahlen)" required maxLength={4} value={newEmpPin} onChange={(e) => setNewEmpPin(e.target.value.replace(/\D/g, ''))} className="w-full px-5 py-4 bg-gray-50 border-2 rounded-2xl font-mono text-2xl text-center" />
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2 relative">
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Einsatzbereiche (Mehrere möglich)</label>
                                            <div className="flex flex-wrap gap-2">
                                                {AVAILABLE_ROLES.map(role => (
                                                    <button
                                                        type="button"
                                                        key={role}
                                                        onClick={() => {
                                                            if (newEmpRoles.includes(role)) {
                                                                if (newEmpRoles.length > 1) setNewEmpRoles(newEmpRoles.filter(r => r !== role));
                                                            } else {
                                                                setNewEmpRoles([...newEmpRoles, role]);
                                                            }
                                                        }}
                                                        className={`px-3 py-2 rounded-xl text-xs font-bold border transition ${newEmpRoles.includes(role) ? 'bg-orange-600 text-white border-orange-600 shadow-md' : 'bg-gray-50 text-gray-500 border-gray-200 hover:bg-gray-100'}`}
                                                    >
                                                        {role}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="relative col-span-2">
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 block">Zugriffsrechte</label>
                                            <select required value={newEmpAccess} onChange={(e) => setNewEmpAccess(e.target.value)} className="w-full px-5 py-4 bg-gray-50 border-2 rounded-2xl font-bold">
                                                <option value="user">Mitarbeiter</option>
                                                <option value="manager">Dienstplaner</option>
                                                <option value="admin">Admin</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                       <div className="relative"><label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 block">Geburtsdatum</label><input type="date" value={newEmpBirthDate} onChange={(e) => setNewEmpBirthDate(e.target.value)} className="w-full px-5 py-4 bg-gray-50 border-2 rounded-2xl font-bold" /></div>
                                       <div className="relative"><label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 block">Soll-Stunden (Woche)</label><input type="number" step="0.5" required value={newEmpWeeklyHours} onChange={(e) => setNewEmpWeeklyHours(e.target.value)} className="w-full px-5 py-4 bg-gray-50 border-2 rounded-2xl font-bold" placeholder="z.B. 40" /></div>
                                    </div>
                                    <button type="submit" className="w-full bg-orange-600 text-white py-5 rounded-2xl font-black text-lg">ANLEGEN</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showDeleteConfirm && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[150] p-4">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black text-red-600">Sicherheits-Check</h2>
                                    <button onClick={() => setShowDeleteConfirm(null)} className="text-gray-400"><X size={24}/></button>
                                </div>
                                <p className="text-sm font-bold text-gray-600 mb-6 text-center">
                                    {showDeleteConfirm.id === 'SYSTEM_RESET' ? 
                                        "ACHTUNG: ALLE DATEN WERDEN GELÖSCHT! Dies kann nicht rückgängig gemacht werden." : 
                                        "Mitarbeiter und alle Zeiten unwiderruflich löschen?"}
                                </p>
                                <form onSubmit={showDeleteConfirm.id === 'SYSTEM_RESET' ? executeSystemReset : executeDeleteEmployee} className="space-y-4">
                                    <input 
                                        type="password" 
                                        placeholder="Admin PIN eingeben" 
                                        value={confirmPinInput} 
                                        onChange={(e) => setConfirmPinInput(e.target.value)} 
                                        className="w-full px-5 py-4 bg-red-50 border-2 border-red-100 rounded-2xl font-mono text-2xl text-center outline-none focus:border-red-500" 
                                        autoFocus
                                    />
                                    <button className="w-full bg-red-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-red-700 transition">BESTÄTIGEN & LÖSCHEN</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {editingLog && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                                <div className="flex justify-between items-center mb-6"><h2 className="text-2xl font-black">Bearbeiten</h2><button onClick={() => setEditingLog(null)} className="text-gray-400"><X size={28}/></button></div>
                                <form onSubmit={handleSaveEdit} className="space-y-4">
                                    <input type="date" required value={editingLog.date} onChange={(e) => setEditingLog({...editingLog, date: e.target.value})} className="w-full px-5 py-3 bg-gray-50 border-2 rounded-2xl font-bold" />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="time" required value={editingLog.startTimeStr} onChange={(e) => setEditingLog({...editingLog, startTimeStr: e.target.value})} className="w-full px-5 py-3 bg-gray-50 border-2 rounded-2xl font-bold" />
                                        <input type="time" required value={editingLog.endTimeStr} onChange={(e) => setEditingLog({...editingLog, endTimeStr: e.target.value})} className="w-full px-5 py-3 bg-gray-50 border-2 rounded-2xl font-bold" />
                                    </div>
                                    <textarea value={editingLog.note} onChange={(e) => setEditingLog({...editingLog, note: e.target.value})} placeholder="Notiz (optional)" className="w-full px-5 py-3 bg-gray-50 border-2 rounded-2xl font-medium h-24 resize-none" />
                                    <button type="submit" className="w-full bg-gray-900 text-white py-5 rounded-2xl font-black text-lg">SPEICHERN</button>
                                </form>
                            </div>
                        </div>
                    )}
                </main>
                
                {(!(!activeEmployee && view === 'terminal')) && (
                    <footer className="py-12 text-center flex-none">
                        <p className="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em]">MABELLE &bull; ID: {appId}</p>
                    </footer>
                )}
            </div>
        );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
